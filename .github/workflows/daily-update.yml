name: DevSync Daily Update

on:
  schedule:
    # Runs at 12:30 UTC every day (no wildcards for hour/minute)
    - cron: '30 12 * * *'
  # This line is crucial so you can trigger it manually right now
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Modify a file to ensure a diff exists
        run: |
          echo "Last automated update: $(date)" > devsync-status.txt

      - name: Commit and push by 23f3003974@ds.study.iitm.ac.in
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add devsync-status.txt
          git commit -m "Automated daily log update"
          git push
